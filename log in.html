<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>


<style>
	body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* LOGIN */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-card {
  background: #90d0f8;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 300px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.logo {
  width: 60px;
}

.input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 20px;
  border: none;
  background: #ddd;
}

.btn {
  background: #00bcd4;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  color: rgb(5, 88, 255);
  cursor: pointer;
}

.cancel {
  background: none;
  border: none;
  margin-left: 10px;
}

.forgot {
  display: block;
  margin-top: 10px;
  font-size: 12px;
}

/* SIDEBAR */
.sidebar {
  width: 200px;
  height: 100vh;
  background: #1e2a38;
  color: rgb(0, 122, 245);
  position: fixed;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar li {
  padding: 15px;
  cursor: pointer;
}

.sidebar li.active {
  background: #023971;
}

/* MAIN */
.main {
  margin-left: 200px;
  padding: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: rgb(5, 33, 244);
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

</style>



<link rel="stylesheet" href="styles.css">
</head>
<body>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="login-container">
    <div class="login-card">
        <img src="logo .png" class="logo" alt="Logo">


<form>
        <h2>Login Form</h2>
        <label for="uname">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>  


        <label for="pwd">Password</label>
            <br>
            <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
            <br> 
        
        <p id="display"></p>


        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">


         <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
    </form>


    <script>
        let attempt_counter = 0;


        function authenticate(){
            let username = document.getElementById("EPLA").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";


        while (attempt_counter < 3) {
        if (username === "EPLA" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "notebook.html";


            break; // stop loop
        }


        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }


        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    </script>



<script>
function login() {
    window.location.href = "notebooks.html";
}
</script>

</body>
</html>
